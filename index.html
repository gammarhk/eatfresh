<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#16A34A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>EatFresh</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    // ═══════════════════════════════════════════════════════════════════
    // CONFIG — replace with your wife's GCP project Client ID
    // ═══════════════════════════════════════════════════════════════════
    const GOOGLE_CLIENT_ID = "284244049564-skrtfguqrasoil6ct9ktms3m783ggdna.apps.googleusercontent.com";
    const SCOPES = "https://www.googleapis.com/auth/spreadsheets.readonly https://www.googleapis.com/auth/drive";
    const SHEET_NAME_PATTERN = "Receipt"; // Gemini Gem names sheets "Receipt_YYYYMMDD_HHmmss"

    // ─── Constants ───────────────────────────────────────────────────
    const CATEGORIES = {
      seafood:   { label: "Seafood",    emoji: "🦐", days: 3,   color: "#0891B2" },
      meat:      { label: "Meat",       emoji: "🥩", days: 5,   color: "#DC2626" },
      vegetable: { label: "Vegetables", emoji: "🥬", days: 7,   color: "#16A34A" },
      dairy:     { label: "Dairy",      emoji: "🥛", days: 7,   color: "#7C3AED" },
      fruit:     { label: "Fruit",      emoji: "🍎", days: 10,  color: "#EA580C" },
      canned:    { label: "Canned/Dry", emoji: "🥫", days: 365, color: "#78716C" },
      bakery:    { label: "Bakery",     emoji: "🍞", days: 5,   color: "#D97706" },
      other:     { label: "Other",      emoji: "📦", days: 5,   color: "#6B7280" },
    };
    const CAT_KEYS = Object.keys(CATEGORIES);

    const CATEGORY_MAP = {
      seafood:"seafood",fish:"seafood",salmon:"seafood",prawn:"seafood",shrimp:"seafood",
      crab:"seafood",clam:"seafood",mussel:"seafood",scallop:"seafood",squid:"seafood",
      oyster:"seafood",lobster:"seafood",cod:"seafood",tuna:"seafood",mackerel:"seafood",sea:"seafood",
      meat:"meat",pork:"meat",beef:"meat",chicken:"meat",duck:"meat",lamb:"meat",
      steak:"meat",mince:"meat",sausage:"meat",bacon:"meat",ham:"meat",turkey:"meat",
      ribs:"meat",thigh:"meat",breast:"meat",wing:"meat",drumstick:"meat",
      vegetable:"vegetable",veg:"vegetable",broccoli:"vegetable",carrot:"vegetable",
      spinach:"vegetable",lettuce:"vegetable",cabbage:"vegetable",onion:"vegetable",
      pepper:"vegetable",tomato:"vegetable",potato:"vegetable",mushroom:"vegetable",
      courgette:"vegetable",aubergine:"vegetable",celery:"vegetable",corn:"vegetable",
      bean:"vegetable",pea:"vegetable",kale:"vegetable",leek:"vegetable",cucumber:"vegetable",
      tofu:"vegetable",pak:"vegetable",choi:"vegetable",
      dairy:"dairy",milk:"dairy",cheese:"dairy",yogurt:"dairy",yoghurt:"dairy",
      butter:"dairy",cream:"dairy",egg:"dairy",
      fruit:"fruit",apple:"fruit",banana:"fruit",orange:"fruit",grape:"fruit",
      berry:"fruit",strawberry:"fruit",blueberry:"fruit",mango:"fruit",pear:"fruit",
      peach:"fruit",plum:"fruit",lemon:"fruit",lime:"fruit",melon:"fruit",kiwi:"fruit",avocado:"fruit",
      canned:"canned",can:"canned",tin:"canned",rice:"canned",pasta:"canned",noodle:"canned",
      flour:"canned",sauce:"canned",oil:"canned",dried:"canned",cereal:"canned",
      frozen:"canned",crisp:"canned",biscuit:"canned",stock:"canned",
      bakery:"bakery",bread:"bakery",croissant:"bakery",muffin:"bakery",pastry:"bakery",
      cake:"bakery",roll:"bakery",bun:"bakery",bagel:"bakery",scone:"bakery",sourdough:"bakery",
    };

    function mapCategory(raw) {
      if (!raw) return "other";
      const t = raw.trim().toLowerCase();
      for (const [kw, cat] of Object.entries(CATEGORY_MAP)) { if (t.includes(kw)) return cat; }
      return "other";
    }

    function calcExpiry(d, cat) { const x = new Date(d); x.setDate(x.getDate() + (CATEGORIES[cat]?.days || 5)); return x.toISOString().slice(0,10); }
    function daysLeft(exp) { const n = new Date(); n.setHours(0,0,0,0); const e = new Date(exp); e.setHours(0,0,0,0); return Math.ceil((e-n)/864e5); }
    function effectiveDays(it) { const r = daysLeft(it.expiryDate); return it.frozen ? Math.round(r*2) : r; }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
    function today() { return new Date().toISOString().slice(0,10); }
    function fmtMMDD(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("en-GB", { month: "short", day: "numeric" });
    }
    function fmtToday() {
      return new Date().toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    }

    function expiryBadge(d) {
      if (d<=0) return {bg:"#EF4444",label:"Expired"};
      if (d<=1) return {bg:"#EF4444",label:"Tomorrow"};
      if (d<=3) return {bg:"#F97316",label:`${d}d`};
      if (d<=5) return {bg:"#EAB308",label:`${d}d`};
      return {bg:"#22C55E",label:`${d}d`};
    }
    function cardBorder(d) {
      if (d<=1) return {bg:"#FEE2E2",border:"#F87171"};
      if (d<=3) return {bg:"#FFF7ED",border:"#FB923C"};
      if (d<=5) return {bg:"#FEFCE8",border:"#FACC15"};
      return {bg:"#F0FDF4",border:"#86EFAC"};
    }

    // ─── IndexedDB ───────────────────────────────────────────────────
    const DB_NAME = "eatfresh";
    const DB_VER = 1;

    function openDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VER);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains("items")) db.createObjectStore("items", { keyPath: "id" });
          if (!db.objectStoreNames.contains("history")) db.createObjectStore("history", { keyPath: "id" });
          if (!db.objectStoreNames.contains("meta")) db.createObjectStore("meta", { keyPath: "key" });
        };
        req.onsuccess = () => res(req.result);
        req.onerror = () => rej(req.error);
      });
    }

    async function dbGetAll(store) {
      const db = await openDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(store, "readonly");
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => res(req.result);
        req.onerror = () => rej(req.error);
      });
    }

    async function dbPutAll(store, items) {
      const db = await openDB();
      const tx = db.transaction(store, "readwrite");
      const os = tx.objectStore(store);
      os.clear();
      items.forEach(i => os.put(i));
      return new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
    }

    async function dbGetMeta(key, fallback) {
      const db = await openDB();
      return new Promise((res) => {
        const tx = db.transaction("meta", "readonly");
        const req = tx.objectStore("meta").get(key);
        req.onsuccess = () => res(req.result?.value ?? fallback);
        req.onerror = () => res(fallback);
      });
    }

    async function dbSetMeta(key, value) {
      const db = await openDB();
      const tx = db.transaction("meta", "readwrite");
      tx.objectStore("meta").put({ key, value });
    }

    // ─── Google Sheets Sync ──────────────────────────────────────────
    function googleLogin() {
      return new Promise((resolve, reject) => {
        if (typeof google === "undefined" || !google.accounts) {
          return reject(new Error("Google Identity Services not loaded"));
        }
        const client = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: SCOPES,
          callback: (resp) => {
            if (resp.error) reject(new Error(resp.error));
            else resolve(resp.access_token);
          },
        });
        client.requestAccessToken();
      });
    }

    async function fetchAndDeleteSheets(token, onProgress) {
      // List spreadsheets matching the Gemini Gem naming pattern
      const q = encodeURIComponent(`mimeType='application/vnd.google-apps.spreadsheet' and name contains '${SHEET_NAME_PATTERN}' and trashed=false`);
      const url = `https://www.googleapis.com/drive/v3/files?q=${q}&orderBy=createdTime%20desc&fields=files(id,name)`;
      console.log("[EatFresh] Drive query:", decodeURIComponent(q));
      const listRes = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!listRes.ok) {
        const err = await listRes.text();
        throw new Error(`Failed to list sheets (${listRes.status}): ${err.slice(0, 200)}`);
      }
      const { files } = await listRes.json();
      console.log("[EatFresh] Sheets found:", files);
      if (!files?.length) return [];

      const allItems = [];
      for (let s = 0; s < files.length; s++) {
        const file = files[s];
        onProgress?.(`Reading "${file.name}" (${s+1}/${files.length})...`);

        // Read columns A-C: Name, Category, Purchase Date
        const sheetRes = await fetch(
          `https://sheets.googleapis.com/v4/spreadsheets/${file.id}/values/A:C`,
          { headers: { Authorization: `Bearer ${token}` } }
        );
        if (sheetRes.ok) {
          const { values } = await sheetRes.json();
          console.log(`[EatFresh] Sheet "${file.name}" values:`, values);
          if (values && values.length > 1) {
            for (let i = 1; i < values.length; i++) {
              const [name, rawCat, rawDate] = values[i] || [];
              if (!name) continue;
              const category = mapCategory(rawCat);
              const purchaseDate = rawDate || today();
              allItems.push({
                id: uid(), name: name.trim(), category, purchaseDate,
                expiryDate: calcExpiry(purchaseDate, category), frozen: false,
              });
            }
          }
        } else {
          console.warn(`[EatFresh] Failed to read sheet "${file.name}":`, sheetRes.status);
        }

        // Delete processed sheet
        onProgress?.(`Deleting "${file.name}"...`);
        await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` },
        });
      }
      return allItems;
    }

    // ─── Notification Scheduler ──────────────────────────────────────
    function scheduleNoonCheck(items) {
      if (!("serviceWorker" in navigator)) return;
      navigator.serviceWorker.ready.then((reg) => {
        reg.active?.postMessage({ type: "CHECK_EXPIRY", items });
      });
    }

    // Schedule daily noon notification check
    function startNoonScheduler(getItems) {
      function msUntilNoon() {
        const now = new Date();
        const noon = new Date(now); noon.setHours(12, 0, 0, 0);
        if (now >= noon) noon.setDate(noon.getDate() + 1);
        return noon - now;
      }
      // Check at noon, then every 24h
      setTimeout(() => {
        scheduleNoonCheck(getItems());
        setInterval(() => scheduleNoonCheck(getItems()), 24 * 60 * 60 * 1000);
      }, msUntilNoon());
    }

    // ─── SwipeCard ───────────────────────────────────────────────────
    function SwipeCard({ children, onSwipe }) {
      const ref = useRef(null);
      const sx = useRef(0), dx = useRef(0), on = useRef(false);
      const start = (e) => { on.current=true; sx.current=e.touches?e.touches[0].clientX:e.clientX; dx.current=0; };
      const move = (e) => { if(!on.current)return; const x=e.touches?e.touches[0].clientX:e.clientX; const d=x-sx.current; if(d>0){dx.current=d; if(ref.current)ref.current.style.transform=`translateX(${Math.min(d,120)}px)`;} };
      const end = () => { if(!on.current)return; on.current=false; if(dx.current>80){if(ref.current){ref.current.style.transform="translateX(100%)";ref.current.style.opacity="0";}setTimeout(()=>onSwipe?.(),250);}else{if(ref.current)ref.current.style.transform="translateX(0)";} };
      return (
        <div style={{position:"relative",overflow:"hidden",borderRadius:14}}>
          <div style={{position:"absolute",left:0,top:0,bottom:0,width:120,background:"linear-gradient(270deg,#FCA5A5,#EF4444)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:15,borderRadius:14}}>✓ Used</div>
          <div ref={ref} onTouchStart={start} onTouchMove={move} onTouchEnd={end} onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
            style={{position:"relative",zIndex:1,transition:on.current?"none":"transform .25s,opacity .25s",cursor:"grab",userSelect:"none"}}>{children}</div>
        </div>
      );
    }

    // ─── ItemCard ────────────────────────────────────────────────────
    const RB = {width:30,height:30,borderRadius:"50%",border:"1.5px solid #D6D3D1",background:"#fff",cursor:"pointer",fontSize:16,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",color:"#57534E"};

    function ItemCard({ item, onUpdate, onUse }) {
      const [editing, setEditing] = useState(false);
      const [editName, setEditName] = useState(item.name);
      const cat = CATEGORIES[item.category]||CATEGORIES.other;
      const days = effectiveDays(item);
      const badge = expiryBadge(days);
      const cb = cardBorder(days);
      const adj = (d) => { const dt=new Date(item.expiryDate); dt.setDate(dt.getDate()+d); onUpdate({...item,expiryDate:dt.toISOString().slice(0,10)}); };
      const saveName = () => { setEditing(false); if(editName.trim()&&editName.trim()!==item.name) onUpdate({...item,name:editName.trim()}); else setEditName(item.name); };
      return (
        <SwipeCard onSwipe={()=>onUse(item.id)}>
          <div style={{background:cb.bg,border:`1.5px solid ${cb.border}`,borderRadius:14,padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                {editing?(
                  <input autoFocus value={editName} onChange={e=>setEditName(e.target.value)} onBlur={saveName} onKeyDown={e=>e.key==="Enter"&&saveName()}
                    style={{font:"inherit",fontSize:17,fontWeight:700,color:"#1C1917",background:"#fff",border:"1.5px solid #D4D4D8",borderRadius:8,padding:"4px 8px",width:"100%",outline:"none"}} />
                ):(
                  <div onClick={()=>{setEditing(true);setEditName(item.name);}} style={{fontSize:17,fontWeight:700,color:"#1C1917",cursor:"text",lineHeight:1.3}}>
                    {item.name}<span style={{fontSize:11,color:"#A8A29E",marginLeft:6,fontWeight:400}}>✏️</span>
                  </div>
                )}
                <div style={{fontSize:12,color:"#78716C",marginTop:3}}>Bought {fmtMMDD(item.purchaseDate)}</div>
              </div>
              <div style={{background:cat.color,color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>{cat.emoji} {cat.label}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <button onClick={()=>adj(-1)} style={RB}>−</button>
                <span style={{fontSize:13,color:"#57534E",minWidth:76,textAlign:"center"}}>Exp {fmtMMDD(item.expiryDate)}</span>
                <button onClick={()=>adj(1)} style={RB}>+</button>
              </div>
              <button onClick={()=>onUpdate({...item,frozen:!item.frozen})} style={{
                background:item.frozen?"#DBEAFE":"#F5F5F4",border:item.frozen?"1.5px solid #60A5FA":"1.5px solid #D6D3D1",
                borderRadius:20,padding:"3px 10px",fontSize:12,cursor:"pointer",fontWeight:600,color:item.frozen?"#1D4ED8":"#78716C",
              }}>{item.frozen?"🧊 Frozen":"❄️ Freeze"}</button>
              <div style={{background:badge.bg,color:"#fff",borderRadius:20,padding:"3px 12px",fontSize:13,fontWeight:700,minWidth:48,textAlign:"center"}}>{badge.label}</div>
            </div>
          </div>
        </SwipeCard>
      );
    }

    // ─── HistoryCard ─────────────────────────────────────────────────
    function HistoryCard({ item, onUndo }) {
      const cat = CATEGORIES[item.category]||CATEGORIES.other;
      return (
        <div style={{background:"#FAFAF9",border:"1.5px solid #E7E5E4",borderRadius:14,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",opacity:0.7}}>
          <div>
            <span style={{fontSize:15,color:"#78716C",textDecoration:"line-through"}}>{item.name}</span>
            <span style={{fontSize:12,color:"#A8A29E",marginLeft:8}}>{cat.emoji}</span>
            <div style={{fontSize:11,color:"#A8A29E",marginTop:2}}>Used on {fmtMMDD(item.usedDate)}</div>
          </div>
          <button onClick={()=>onUndo(item.id)} style={{background:"#fff",border:"1.5px solid #D6D3D1",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",color:"#57534E",fontWeight:600}}>↩ Undo</button>
        </div>
      );
    }

    // ─── AddModal ────────────────────────────────────────────────────
    function AddModal({ open, onClose, onAdd }) {
      const [name, setName] = useState("");
      const [cat, setCat] = useState("other");
      const [date, setDate] = useState(today());
      if (!open) return null;
      const submit = () => { if(!name.trim())return; onAdd({name:name.trim(),category:cat,purchaseDate:date}); setName("");setCat("other");setDate(today());onClose(); };
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 32px",width:"100%",maxWidth:480,animation:"slideUp .3s ease"}}>
            <div style={{fontSize:18,fontWeight:800,color:"#1C1917",marginBottom:18,textAlign:"center"}}>Add Item</div>
            <input placeholder="Item name" value={name} onChange={e=>setName(e.target.value)} autoFocus
              style={{width:"100%",padding:"12px 14px",fontSize:16,border:"1.5px solid #D6D3D1",borderRadius:10,outline:"none",marginBottom:12,boxSizing:"border-box",fontFamily:"inherit"}} />
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
              {CAT_KEYS.map(k=>{const c=CATEGORIES[k];const a=cat===k;return(
                <button key={k} onClick={()=>setCat(k)} style={{padding:"6px 14px",borderRadius:20,fontSize:13,fontWeight:600,border:a?`2px solid ${c.color}`:"1.5px solid #E7E5E4",background:a?c.color+"18":"#FAFAF9",color:a?c.color:"#78716C",cursor:"pointer"}}>{c.emoji} {c.label}</button>
              );})}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
              <span style={{fontSize:14,color:"#57534E",fontWeight:600}}>Purchase date</span>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{flex:1,padding:"8px 12px",fontSize:14,border:"1.5px solid #D6D3D1",borderRadius:8,outline:"none",fontFamily:"inherit"}} />
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={onClose} style={{flex:1,padding:"13px",borderRadius:12,border:"1.5px solid #D6D3D1",background:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",color:"#78716C"}}>Cancel</button>
              <button onClick={submit} style={{flex:2,padding:"13px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#16A34A,#22C55E)",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>Add</button>
            </div>
          </div>
        </div>
      );
    }

    // ─── LoginScreen ─────────────────────────────────────────────────
    function LoginScreen({ onLogin, syncing, syncMsg }) {
      return (
        <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,background:"linear-gradient(180deg,#FEFCE8 0%,#FFF7ED 40%,#FFFBEB 100%)"}}>
          <div style={{fontSize:72,marginBottom:16}}>🥬</div>
          <div style={{fontSize:32,fontWeight:800,color:"#1C1917",marginBottom:6,letterSpacing:-0.5}}>EatFresh</div>
          <div style={{fontSize:15,color:"#78716C",marginBottom:40,textAlign:"center"}}>Keep track of what's in the fridge.<br/>Waste less, eat fresher.</div>
          {syncing?(
            <div style={{textAlign:"center"}}>
              <div style={{width:40,height:40,border:"3.5px solid #E7E5E4",borderTopColor:"#16A34A",borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto 16px"}} />
              <div style={{fontSize:15,fontWeight:700,color:"#1C1917",marginBottom:6}}>Syncing...</div>
              <div style={{fontSize:13,color:"#78716C",animation:"pulse 1.5s infinite"}}>{syncMsg}</div>
            </div>
          ):(
            <>
              <button onClick={onLogin} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 32px",borderRadius:14,border:"1.5px solid #D6D3D1",background:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",color:"#1C1917",boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
              </button>
              <div style={{fontSize:12,color:"#A8A29E",marginTop:14,textAlign:"center"}}>Auto-imports receipts from Google Sheets on sign-in</div>
            </>
          )}
        </div>
      );
    }

    // ─── Toast ───────────────────────────────────────────────────────
    function Toast({ message, onUndo, visible }) {
      return (
        <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:"#1C1917",color:"#fff",borderRadius:12,padding:"12px 20px",fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:14,zIndex:200,boxShadow:"0 8px 30px rgba(0,0,0,.3)",opacity:visible?1:0,pointerEvents:visible?"auto":"none",transition:"opacity .3s",maxWidth:"90vw"}}>
          {message}
          {onUndo&&<button onClick={onUndo} style={{background:"#22C55E",color:"#fff",border:"none",borderRadius:8,padding:"5px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Undo</button>}
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────
    function EatFresh() {
      const [auth, setAuth] = useState(null);
      const [items, setItems] = useState([]);
      const [history, setHistory] = useState([]);
      const [tab, setTab] = useState("active");
      const [showAdd, setShowAdd] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const [syncMsg, setSyncMsg] = useState("");
      const [lastSync, setLastSync] = useState(null);
      const [toast, setToast] = useState({visible:false,message:"",undoFn:null});
      const [loaded, setLoaded] = useState(false);
      const tt = useRef(null);
      const itemsRef = useRef(items);
      itemsRef.current = items;

      // Load from IndexedDB
      useEffect(() => {
        (async () => {
          const [it, hi, tok, ls] = await Promise.all([
            dbGetAll("items"), dbGetAll("history"),
            dbGetMeta("token", null), dbGetMeta("lastSync", null),
          ]);
          setItems(it); setHistory(hi); setLastSync(ls);
          if (tok) setAuth({ token: tok });
          setLoaded(true);
        })();
      }, []);

      // Persist on change
      useEffect(() => { if (loaded) dbPutAll("items", items); }, [items, loaded]);
      useEffect(() => { if (loaded) dbPutAll("history", history); }, [history, loaded]);

      // Request notification permission + schedule noon check
      useEffect(() => {
        if (loaded && items.length > 0) {
          if ("Notification" in window && Notification.permission === "default") {
            Notification.requestPermission();
          }
          startNoonScheduler(() => itemsRef.current);
        }
      }, [loaded]);

      const flash = (msg, undo=null) => {
        if(tt.current)clearTimeout(tt.current);
        setToast({visible:true,message:msg,undoFn:undo});
        tt.current=setTimeout(()=>setToast(t=>({...t,visible:false})),4000);
      };

      // ── Sync ────────────────────────────────────────────────────
      const runSync = async (token) => {
        setSyncing(true); setSyncMsg("Connecting to Google Sheets...");
        try {
          const imported = await fetchAndDeleteSheets(token, m => setSyncMsg(m));
          if (imported.length > 0) { setItems(prev => [...prev, ...imported]); flash(`Imported ${imported.length} items`); }
          else flash("No new receipts to import");
          const now = new Date().toLocaleString("en-GB", {hour:"2-digit",minute:"2-digit",month:"short",day:"numeric"});
          setLastSync(now); dbSetMeta("lastSync", now);
        } catch (e) { flash("Sync failed: " + (e.message || "unknown error")); }
        setSyncing(false); setSyncMsg("");
      };

      // ── Login → auto sync ──────────────────────────────────────
      const handleLogin = async () => {
        setSyncing(true); setSyncMsg("Signing in...");
        try {
          const token = await googleLogin();
          setAuth({ token }); dbSetMeta("token", token);
          setSyncMsg("Signed in! Importing receipts...");
          await runSyncWithToken(token);
        } catch (e) {
          flash("Sign-in failed: " + (e.message || "cancelled"));
          setSyncing(false); setSyncMsg("");
        }
      };

      async function runSyncWithToken(token) {
        try {
          const imported = await fetchAndDeleteSheets(token, m => setSyncMsg(m));
          if (imported.length > 0) setItems(prev => [...prev, ...imported]);
          const now = new Date().toLocaleString("en-GB", {hour:"2-digit",minute:"2-digit",month:"short",day:"numeric"});
          setLastSync(now); dbSetMeta("lastSync", now);
        } catch {}
        setSyncing(false); setSyncMsg("");
      }

      const handleResync = () => {
        if (!auth?.token) { handleLogin(); return; }
        runSync(auth.token);
      };

      // ── Item ops ───────────────────────────────────────────────
      const addItem = ({name,category,purchaseDate}) => {
        setItems(prev=>[...prev,{id:uid(),name,category,purchaseDate,expiryDate:calcExpiry(purchaseDate,category),frozen:false}]);
        flash(`Added ${name}`);
      };
      const updateItem = (u) => setItems(prev=>prev.map(i=>i.id===u.id?u:i));
      const markUsed = (id) => {
        const item=items.find(i=>i.id===id); if(!item)return;
        setItems(prev=>prev.filter(i=>i.id!==id));
        setHistory(prev=>[{...item,usedDate:today()},...prev]);
        flash(`${item.name} marked as used`,()=>{
          setHistory(prev=>prev.filter(h=>h.id!==id));
          setItems(prev=>[...prev,item]);
        });
      };
      const undoUsed = (id) => {
        const item=history.find(h=>h.id===id); if(!item)return;
        setHistory(prev=>prev.filter(h=>h.id!==id));
        const {usedDate,...rest}=item;
        setItems(prev=>[...prev,rest]);
        flash(`${item.name} restored`);
      };

      const sorted=[...items].sort((a,b)=>effectiveDays(a)-effectiveDays(b));
      const urgent=items.filter(i=>effectiveDays(i)<=3).length;

      if(!auth) return <LoginScreen onLogin={handleLogin} syncing={syncing} syncMsg={syncMsg} />;

      return (
        <div style={{maxWidth:480,margin:"0 auto",minHeight:"100vh",background:"linear-gradient(180deg,#FEFCE8 0%,#FFF7ED 30%,#FFFBEB 100%)",paddingBottom:80}}>
          <div style={{padding:"16px 20px 0",fontSize:13,color:"#A8A29E",fontWeight:500}}>{fmtToday()}</div>
          <div style={{padding:"8px 20px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:26,fontWeight:800,color:"#1C1917",letterSpacing:-0.5}}>🥬 EatFresh</div>
              <div style={{fontSize:13,color:"#78716C",marginTop:2}}>
                {items.length} item{items.length!==1?"s":""} in stock
                {urgent>0&&<span style={{color:"#EF4444",fontWeight:700,marginLeft:8}}>⚠ {urgent} expiring soon</span>}
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={handleResync} disabled={syncing} style={{background:syncing?"#F5F5F4":"#fff",border:"1.5px solid #D6D3D1",borderRadius:10,padding:"6px 12px",fontSize:12,cursor:syncing?"default":"pointer",fontWeight:600,color:"#57534E"}}>{syncing?"⏳":"🔄"} Sync</button>
              <button onClick={()=>{setAuth(null);dbSetMeta("token",null);}} style={{background:"#fff",border:"1.5px solid #D6D3D1",borderRadius:10,padding:"6px 12px",fontSize:12,cursor:"pointer",color:"#A8A29E",fontWeight:600}}>Sign out</button>
            </div>
          </div>

          {syncing?(
            <div style={{margin:"0 20px 8px",padding:"10px 14px",background:"#EFF6FF",border:"1.5px solid #93C5FD",borderRadius:12,display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:16,height:16,border:"2px solid #BFDBFE",borderTopColor:"#3B82F6",borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}} />
              <span style={{fontSize:13,color:"#1E40AF",fontWeight:600}}>{syncMsg}</span>
            </div>
          ):lastSync?(
            <div style={{margin:"0 20px 8px",fontSize:11,color:"#A8A29E"}}>Last synced: {lastSync}</div>
          ):null}

          <div style={{display:"flex",margin:"0 20px",background:"#F5F5F4",borderRadius:12,padding:3}}>
            {[{key:"active",label:`In Stock (${items.length})`},{key:"history",label:`Used (${history.length})`}].map(t=>(
              <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"10px 0",borderRadius:10,border:"none",background:tab===t.key?"#fff":"transparent",boxShadow:tab===t.key?"0 1px 4px rgba(0,0,0,.08)":"none",fontSize:14,fontWeight:700,cursor:"pointer",color:tab===t.key?"#1C1917":"#A8A29E",transition:"all .2s"}}>{t.label}</button>
            ))}
          </div>

          <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:10}}>
            {tab==="active"?(
              sorted.length===0?(
                <div style={{textAlign:"center",padding:"60px 20px",color:"#A8A29E"}}>
                  <div style={{fontSize:48,marginBottom:12}}>🛒</div>
                  <div style={{fontSize:16,fontWeight:700}}>No items yet</div>
                  <div style={{fontSize:13,marginTop:6}}>Scan a receipt with Gemini, or tap + to add manually</div>
                </div>
              ):(
                <>
                  <div style={{fontSize:11,color:"#A8A29E",textAlign:"center",marginBottom:2}}>← Swipe right to mark as used →</div>
                  {sorted.map(item=><ItemCard key={item.id} item={item} onUpdate={updateItem} onUse={markUsed} />)}
                </>
              )
            ):(
              history.length===0?(
                <div style={{textAlign:"center",padding:"60px 20px",color:"#A8A29E"}}>
                  <div style={{fontSize:48,marginBottom:12}}>📭</div>
                  <div style={{fontSize:16,fontWeight:700}}>No history yet</div>
                </div>
              ):history.map(item=><HistoryCard key={item.id} item={item} onUndo={undoUsed} />)
            )}
          </div>

          {tab==="active"&&(
            <button onClick={()=>setShowAdd(true)} style={{position:"fixed",bottom:24,right:24,width:56,height:56,borderRadius:"50%",border:"none",background:"linear-gradient(135deg,#16A34A,#22C55E)",color:"#fff",fontSize:28,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(22,163,74,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>+</button>
          )}

          <AddModal open={showAdd} onClose={()=>setShowAdd(false)} onAdd={addItem} />
          <Toast message={toast.message} onUndo={toast.undoFn} visible={toast.visible} />
        </div>
      );
    }

    // ─── Boot ────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<EatFresh />);

    // Register service worker
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>
</body>
</html>
